<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-r from-gray-900 to-gray-700 p-5"
>
  <div
    class="bg-white/10 backdrop-blur-md border border-white/20 shadow-xl rounded-2xl p-8 w-full max-w-md text-white"
  >
    <h2 class="text-3xl font-bold text-center mb-6 uppercase tracking-wide">Register</h2>

    <form class="space-y-5">
      <!-- Name Input -->
      <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input
          type="text"
          name="username"
          class="w-full p-3 rounded-lg bg-white/20 border border-white/30 focus:border-blue-400 focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter your name"
          [(ngModel)]="creds.Username"
        />
      </div>

      <!-- Email Input -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          name="email"
          class="w-full p-3 rounded-lg bg-white/20 border border-white/30 focus:border-blue-400 focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter your email"
          [(ngModel)]="creds.Email"
        />
      </div>

      <!-- Password Input -->
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          name="password"
          class="w-full p-3 rounded-lg bg-white/20 border border-white/30 focus:border-blue-400 focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter your password"
          [(ngModel)]="creds.Password"
        />
      </div>

      <div class="flex gap-3">
        <button
          (click)="register()"
          type="submit"
          class="p-3 rounded-lg bg-blue-600 hover:bg-blue-700 transition font-semibold text-lg"
        >
          Create Account
        </button>
        <button
          (click)="cancel()"
          type="button"
          class="p-3 hover:bg-amber-800 rounded-lg font-semibold text-lg border-4"
        >
          Cancel
        </button>
      </div>
    </form>

    <p class="text-center text-sm mt-4 text-white/80">
      Already have an account?
      <a class="text-blue-300 hover:text-blue-400 cursor-pointer">Login</a>
    </p>
  </div>
</div>
