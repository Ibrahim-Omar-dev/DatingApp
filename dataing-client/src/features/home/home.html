<div class="hero min-h-screen bg-base-200">
  @if(!registerMode()){
  <div class="hero-content text-center">
    <div class="flex items-center flex-col">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-40 text-blue-700 mb-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"
        />
      </svg>
      <h3 class="text-5xl font-bold">Find your match!</h3>
      <p class="py-6">Come on in ... all you want to do is sign up</p>

      <div class="flex gap-3 items-center">
        <button (click)="showRegister(true)" class="btn btn-primary btn-lg">Register</button>
        <button class="btn btn-info btn-lg">Learn m ore</button>
      </div>
    </div>
  </div>
  } @else {
  <div class="flex justify-center w-full">
    <app-register class="w-full" (RegisterMode)="showRegister($event)"></app-register>
  </div>
  }
</div>
