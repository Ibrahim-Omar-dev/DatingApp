<header class="p-3 w-full top-0 fixed z-50 bg-gradient-to-r from-primary to-black">
  <div class="flex align-middle items-center px-10 mx-auto gap-6">
    <!-- Logo -->
    <a class="flex gap-3 items-center border-r-2 px-3 border-white">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      ></svg>

      <h3 class="text-2xl font-semibold text-white uppercase">Dating App</h3>
    </a>

    <!-- Navigation -->
    <nav class="flex gap-3 my-2 uppercase text-lg text-white">
      <a>Matches</a>
      <a>Lists</a>
      <a>Messages</a>
    </nav>

    <div class="flex align-middle ml-auto gap-3">
      <!-- ⭐ Show LOGIN FORM when NO user is logged in -->
      @if (!accountServices.currentUser()) {
      <form #loginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-3">
        <input
          type="text"
          name="Email"
          [(ngModel)]="creds.Email"
          class="input"
          placeholder="Email"
        />

        <input
          type="password"
          name="Password"
          [(ngModel)]="creds.Password"
          class="input"
          placeholder="Password"
        />

        <button type="submit" class="btn btn-primary ml-2">Login</button>
      </form>
      }

      <!-- ⭐ Show USER DROPDOWN when user IS logged in -->
      @else {
      <div class="dropdown dropdown-bottom dropdown-center">
        <div tabindex="0" role="button" class="flex items-center gap-3 cursor-pointer">
          <img src="user.png" alt="User Avatar" class="w-8 h-8 rounded-full" />
          <span>{{ accountServices.currentUser().name }}</span>
        </div>

        <ul
          tabindex="-1"
          class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
        >
          <li><a>Edit Profile</a></li>
          <li><a (click)="logout()">Logout</a></li>
        </ul>
      </div>
      }
    </div>
  </div>
</header>
